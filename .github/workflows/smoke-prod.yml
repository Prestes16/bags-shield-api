name: ci(smoke): prod health (manual)

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping /api/health (prod)
        shell: bash
        run: |
          set -Eeuo pipefail
          URL="https://bags-shield-api.vercel.app/api/health"
          echo "Ping: ${URL}"
          HTTP=$(curl -sS -o /dev/null -w "%{http_code}" "${URL}" || true)
          echo "HTTP=${HTTP}"
          test "${HTTP}" = "200" || { echo "Health check falhou (HTTP=${HTTP})"; exit 1; }
